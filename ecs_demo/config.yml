# -*- coding: utf-8 -*-
# 电商客服Demo配置文件

recipe: default.v1
language: zh

# Pipeline配置
pipeline:
  - name: LLMCommandGenerator
    llm: default  # 引用endpoints.yml中的模型配置

# 策略配置
policies:
  - name: FlowPolicy
  - name: MemberPolicy
  - name: EnterpriseSearchPolicy
    llm: default
    # 知识库切换：GraphRAG(Neo4j) 或 FastAPIRetriever(外部服务)
    # vector_store: addons.information_retrieval.GraphRAG
    vector_store: addons.fastapi_retriever.FastAPIRetriever
